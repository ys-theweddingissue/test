<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends Gallery | Yusaku & Saori</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --color-bg: #FAF8F5;
            --color-text: #4A4238;
            --color-accent: #8C9A8E;
            --color-border: #D3CBB8;
        }

        body {
            font-family: 'Lato', 'Noto Sans JP', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
        }

        .serif { font-family: 'Cormorant Garamond', serif; }

        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .img-container {
            overflow: hidden;
            position: relative;
            background-color: #f0f0f0;
        }
        .img-container img {
            transition: transform 1.2s ease;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .img-container:hover img {
            transform: scale(1.05);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--color-bg); }
        ::-webkit-scrollbar-thumb { background: var(--color-accent); border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-[#FAF8F5]/80 backdrop-blur-md transition-all duration-300">
        <a href="javascript:history.back()" class="font-lato text-xl tracking-widest font-bold cursor-pointer hover:text-[#8C9A8E] transition-colors">
            Y & S
        </a>
        <button onclick="history.back()" class="p-2 focus:outline-none hover:scale-110 transition-transform flex items-center gap-2">
            <span class="text-[10px] tracking-widest opacity-60">CLOSE</span>
            <i data-lucide="x" class="w-5 h-5 text-wedding-text"></i>
        </button>
    </header>
    
    <header class="h-screen flex flex-col items-center justify-center px-6 md:px-20">
        <div class="relative w-full max-w-6xl aspect-[18/7] md:aspect-[21/9] overflow-hidden reveal">
            <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&q=80&w=2000" alt="Biography Hero" class="w-full h-full object-cover brightness-75">
            <div class="absolute inset-0 flex flex-col items-center justify-center text-white">
                <h1 class="font-family text-5xl md:text-8xl font-light tracking-widest drop-shadow-sm">GALLERY</h1>
            </div>
        </div>
        <div class="mt-40 reveal">
            <div class="animate-bounce text-[#8C9A8E]">
                <i data-lucide="chevron-down" class="w-6 h-6 opacity-50"></i>
            </div>
        </div>
    </header>


    <main class="max-w-[1200px] mx-auto px-4 md:px-12 py-20">
        <div class="grid grid-cols-2 md:grid-cols-12 gap-3 md:gap-6">
            
            <div class="col-span-1 md:col-span-4 aspect-square img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_01.jpg"></div>
            <div class="col-span-1 md:col-span-4 aspect-square img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_02.jpg"></div>
            <div class="col-span-2 md:col-span-4 aspect-[4/3] md:aspect-auto md:row-span-2 img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_03.jpg"></div>
            
            <div class="col-span-1 md:col-span-3 aspect-[3/4] img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_04.jpg"></div>
            <div class="col-span-1 md:col-span-5 aspect-[4/3] md:aspect-auto img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_05.jpg"></div>

            <div class="col-span-2 md:col-span-8 aspect-[16/9] img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_06.jpg"></div>
            <div class="col-span-1 md:col-span-4 aspect-square img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_07.jpg"></div>

            <div class="col-span-1 md:col-span-4 aspect-[2/3] img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_08.jpg"></div>
            <div class="col-span-1 md:col-span-4 aspect-square img-container reveal md:mt-12"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_09.jpg"></div>
            <div class="col-span-1 md:col-span-4 aspect-[3/4] img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_10.jpg"></div>

            <div class="col-span-2 md:col-span-6 aspect-[16/9] img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_11.jpg"></div>
            <div class="col-span-2 md:col-span-6 aspect-[16/9] img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_12.jpg"></div>

            <div class="col-span-1 md:col-span-3 aspect-square img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_13.jpg"></div>
            <div class="col-span-1 md:col-span-3 aspect-square img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_14.jpg"></div>
            <div class="col-span-1 md:col-span-3 aspect-square img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_15.jpg"></div>
            <div class="col-span-1 md:col-span-3 aspect-square img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_16.jpg"></div>

            <div class="col-span-2 md:col-span-4 aspect-[4/5] img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_17.jpg"></div>
            <div class="col-span-1 md:col-span-8 aspect-square md:aspect-auto img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_18.jpg"></div>
            <div class="col-span-1 md:col-span-12 aspect-[21/9] hidden md:block img-container reveal"><img src="https://res.cloudinary.com/dmfyysmqy/image/upload/guest_gallery_19.jpg"></div>
        </div>

        <section class="reveal pt-24 text-center">
            <button onclick="history.back()" class="group inline-flex flex-col items-center gap-4 transition-all hover:scale-105">
                <div class="w-10 h-10 rounded-full border border-[#4A4238]/20 flex items-center justify-center group-hover:bg-[#4A4238] group-hover:text-white transition-all">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                </div>
                <span class="block text-[9px] tracking-[0.4em] text-[#4A4238]/40 uppercase font-bold">Back to Page</span>
            </button>
        </section>
    </main>

    <footer class="bg-white py-16 text-center border-t border-wedding-border/20 relative z-10">
        <h2 class="font-lato text-2xl tracking-[0.3em] mb-4 font-light">YUSAKU & SAORI</h2>
        <p class="font-lato text-xs tracking-[0.2em] text-wedding-text/40 mb-2">2026.9.12</p>
        <p class="text-[10px] text-wedding-text/30 font-light">Thank you for coming to our wedding.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
